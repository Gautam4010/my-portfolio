<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Animation</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #f4f4f4;
      padding: 50px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      display: inline-block;
      border-right: 2px solid black;
      white-space: nowrap;
      overflow: hidden;
    }

    .cursor {
      animation: blink 0.7s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        border-color: transparent;
      }
    }
  </style>
</head>
<body>

  <h1 id="type-text" class="cursor"></h1>

  <script>
    const text = "Welcome to My Portfolio";
    const speed = 100; // typing speed in milliseconds
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        document.getElementById("type-text").textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      } else {
        document.getElementById("type-text").classList.remove('cursor'); // stop blinking after done
      }
    }

    window.onload = typeWriter;
  </script>

</body>
</html>
